<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestion du matériel</title>
    <!-- We inline the specific styles from historique_inventaire.php to ensure exact match -->
    <style>
      /* Keep minimal custom styles for complex elements difficult to do purely in inline Tailwind */
      /* Autocomplete positioning */
      .autocomplete-suggestions {
        position: absolute;
        max-height: 200px;
        overflow-y: auto;
        z-index: 9999;
        width: 100%;
        border-radius: 0 0 10px 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        background: white;
        border: 1px solid #e5e7eb;
        margin-top: 5px;
      }
      .autocomplete-suggestions:empty {
        display: none !important;
      }
      .autocomplete-suggestion {
        padding: 10px 15px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .autocomplete-suggestion:hover {
        background: #f3f4f6;
      }
      .box-input-wrapper {
        position: relative;
        min-width: 150px;
        flex: 1;
        overflow: visible;
      }
    </style>
    <link rel="stylesheet" href="CSS/output.css" />
  </head>
  <body
    class="font-sans bg-white min-h-screen p-5 leading-relaxed text-gray-800"
  >
    <div
      class="max-w-[1400px] mx-auto bg-white rounded-2xl shadow-custom-lg border border-custom-border relative"
    >
      <header
        class="bg-linear-to-br from-custom-brandLight to-custom-brandDark text-white py-10 px-8 text-center relative overflow-hidden"
      >
        <!-- Pseudo element simulation for pulse effect using absolute div behind content -->
        <div
          class="absolute -top-1/2 -left-1/2 w-[200%] h-[200%] bg-[radial-gradient(circle,rgba(255,255,255,0.1)_0%,transparent_70%)] animate-pulseSlow pointer-events-none"
        ></div>
        <h1
          class="text-4xl lg:text-5xl font-bold mb-4 drop-shadow-md relative z-10 inline-block"
        >
          Gestion du matériel
        </h1>
        <p class="text-lg opacity-90 font-light relative z-10">
          Administration et inventaire global
        </p>
        <button
          id="btn-open-barcode"
          class="absolute top-5 right-5 bg-white/20 hover:bg-white/30 text-white border border-white/40 backdrop-blur-sm px-4 py-2 rounded-full text-sm transition-all duration-300 transform hover:-translate-y-0.5 z-20"
        >
          Générateur Code-barres
        </button>
      </header>

      <!-- No stats container here as it's not relevant, but structure mimics reference -->

      <div
        class="p-8 bg-white border-b border-custom-border flex flex-wrap gap-5 items-center"
      >
        <!-- Mode Selector styled like the Filter Select -->
        <div
          id="main_horizontal_wrapper"
          class="flex items-center w-full gap-4"
        >
          <div class="min-w-[200px]">
            <select
              id="modeSelector"
              class="w-full px-4 py-3 border-2 border-custom-brandLight rounded-full text-sm font-bold text-custom-brandLight transition-all duration-300 bg-white shadow-input focus:outline-none focus:border-custom-brandLight focus:ring-4 focus:ring-custom-brandLight/15"
            >
              <option value="ajout">➕ Ajouter</option>
              <option value="suppression">🗑️ Supprimer</option>
              <option value="modification">✏️ Modifier</option>
              <option value="consultation" selected>🔍 Consulter</option>
            </select>
          </div>

          <!-- Action Forms Container -->
          <div id="actionForms" class="flex-1 pl-3">
            <!-- AJOUT -->
            <form
              id="form_ajout"
              class="flex flex-wrap items-center gap-2.5 w-full hidden"
            >
              <div class="flex items-center gap-1.5">
                <button
                  type="button"
                  id="btn_caisse_ajout"
                  class="px-4 py-2 border-2 border-custom-border bg-white text-gray-800 rounded-lg font-semibold text-sm shadow-input hover:bg-gray-50 transition-all duration-300"
                >
                  Caisse
                </button>
              </div>
              <div class="box-input-wrapper">
                <input
                  type="text"
                  id="type_materiel_ajout"
                  placeholder="Type..."
                  autocomplete="off"
                  class="w-full px-4 py-3 border-2 border-custom-border rounded-full text-sm transition-all duration-300 bg-white shadow-input focus:outline-none focus:border-custom-brandLight focus:ring-4 focus:ring-custom-brandLight/15"
                />
                <div
                  id="type_suggestions_ajout"
                  class="autocomplete-suggestions"
                ></div>
              </div>
              <div class="box-input-wrapper">
                <input
                  type="text"
                  id="nom_materiel_ajout"
                  placeholder="Nom..."
                  autocomplete="off"
                  class="w-full px-4 py-3 border-2 border-custom-border rounded-full text-sm transition-all duration-300 bg-white shadow-input focus:outline-none focus:border-custom-brandLight focus:ring-4 focus:ring-custom-brandLight/15"
                />
                <div
                  id="nom_suggestions_ajout"
                  class="autocomplete-suggestions"
                ></div>
              </div>
              <input
                type="number"
                id="nombre_materiel"
                value="1"
                min="1"
                class="w-20 px-4 py-3 border-2 border-custom-border rounded-full text-sm transition-all duration-300 bg-white shadow-input focus:outline-none focus:border-custom-brandLight focus:ring-4 focus:ring-custom-brandLight/15"
                placeholder="Qté"
              />
              <button
                type="submit"
                class="px-6 py-3 border-2 border-custom-brandLight bg-custom-brandLight text-white rounded-full font-semibold text-sm shadow-input hover:shadow-[0_4px_15px_rgba(182,160,113,0.4)] hover:-translate-y-0.5 transition-all duration-300"
              >
                Ajouter
              </button>
              <button
                type="button"
                class="btn-reset px-6 py-3 border-2 border-custom-border bg-white text-gray-800 rounded-full font-semibold text-sm shadow-input hover:bg-gray-50 transition-all duration-300"
                data-form="form_ajout"
              >
                Réinitialiser
              </button>
            </form>

            <!-- SUPPRESSION -->
            <form
              id="form_suppression"
              class="flex flex-wrap items-center gap-2.5 w-full hidden"
            >
              <div class="flex items-center gap-1.5">
                <button
                  type="button"
                  id="btn_caisse_suppression"
                  class="px-4 py-2 border-2 border-custom-border bg-white text-gray-800 rounded-lg font-semibold text-sm shadow-input hover:bg-gray-50 transition-all duration-300"
                >
                  Caisse
                </button>
              </div>
              <div class="box-input-wrapper">
                <input
                  type="text"
                  id="id_materiel_suppr"
                  placeholder="Scan Code-barre..."
                  class="w-full px-4 py-3 border-2 border-custom-border rounded-full text-sm transition-all duration-300 bg-white shadow-input focus:outline-none focus:border-custom-brandLight focus:ring-4 focus:ring-custom-brandLight/15"
                />
              </div>
              <div class="box-input-wrapper">
                <input
                  type="text"
                  id="type_materiel_suppr"
                  placeholder="Type..."
                  readonly
                  class="w-full px-4 py-3 border-2 border-custom-border rounded-full text-sm transition-all duration-300 bg-gray-50 shadow-input focus:outline-none"
                />
              </div>
              <div class="box-input-wrapper">
                <input
                  type="text"
                  id="nom_materiel_suppr"
                  placeholder="Nom..."
                  readonly
                  class="w-full px-4 py-3 border-2 border-custom-border rounded-full text-sm transition-all duration-300 bg-gray-50 shadow-input focus:outline-none"
                />
              </div>
              <!-- Caisse Suppr Input moved to panel_suppression_caisse -->
              <button
                type="submit"
                class="px-6 py-3 border-2 border-custom-danger bg-linear-to-br from-custom-danger to-custom-dangerDark text-white rounded-full font-semibold text-sm shadow-input hover:shadow-[0_4px_15px_rgba(239,68,68,0.4)] hover:-translate-y-0.5 transition-all duration-300"
              >
                Supprimer
              </button>
              <button
                type="button"
                class="btn-reset ml-2.5 px-6 py-3 border-2 border-custom-border bg-white text-gray-800 rounded-full font-semibold text-sm shadow-input hover:bg-gray-50 transition-all duration-300"
                data-form="form_suppression"
              >
                Réinitialiser
              </button>
            </form>

            <!-- MODIFICATION -->
            <form
              id="form_modification"
              class="flex flex-wrap items-center gap-2.5 w-full hidden"
            >
              <div class="flex items-center gap-1.5">
                <button
                  type="button"
                  id="btn_caisse_modification"
                  class="px-4 py-2 border-2 border-custom-border bg-white text-gray-800 rounded-lg font-semibold text-sm shadow-input hover:bg-gray-50 transition-all duration-300"
                >
                  Caisse
                </button>
              </div>
              <div class="box-input-wrapper">
                <input
                  type="text"
                  id="id_materiel"
                  placeholder="Scan ID..."
                  required
                  class="w-full px-4 py-3 border-2 border-custom-border rounded-full text-sm transition-all duration-300 bg-white shadow-input focus:outline-none focus:border-custom-brandLight focus:ring-4 focus:ring-custom-brandLight/15"
                />
              </div>
              <select
                id="etat"
                class="px-4 py-3 border-2 border-custom-border rounded-full text-sm transition-all duration-300 bg-white shadow-input focus:outline-none focus:border-custom-brandLight focus:ring-4 focus:ring-custom-brandLight/15"
                style="width: 140px"
              >
                <option value="disponible">Disponible</option>
                <option value="réservé">Réservé</option>
                <option value="emprunté">Emprunté</option>
              </select>
              <div class="box-input-wrapper">
                <input
                  type="text"
                  id="reserveur_emprunteur"
                  placeholder="Utilisateur..."
                  autocomplete="off"
                  class="w-full px-4 py-3 border-2 border-custom-border rounded-full text-sm transition-all duration-300 bg-white shadow-input focus:outline-none focus:border-custom-brandLight focus:ring-4 focus:ring-custom-brandLight/15"
                />
                <div
                  id="autocomplete_suggestions"
                  class="autocomplete-suggestions"
                ></div>
                <input type="hidden" id="reserveur_emprunteur_id" />
              </div>

              <!-- Hidden fields removed: nom_materiel_modif, type_materiel_modif -->

              <button
                type="submit"
                class="px-6 py-3 border-2 border-custom-brandLight bg-custom-brandLight text-white rounded-full font-semibold text-sm shadow-input hover:shadow-[0_4px_15px_rgba(182,160,113,0.4)] hover:-translate-y-0.5 transition-all duration-300"
              >
                Enregistrer
              </button>
              <button
                type="button"
                class="btn-reset ml-2.5 px-6 py-3 border-2 border-custom-border bg-white text-gray-800 rounded-full font-semibold text-sm shadow-input hover:bg-gray-50 transition-all duration-300"
                data-form="form_modification"
              >
                Réinitialiser
              </button>
            </form>

            <!-- CONSULTATION -->
            <div
              id="filters_consultation"
              class="flex flex-wrap items-center gap-2.5 w-full hidden"
            >
              <div
                id="filter_section"
                class="flex flex-wrap items-center gap-2.5 w-full"
              >
                <div class="box-input-wrapper">
                  <input
                    type="text"
                    id="code_barre_consultation"
                    placeholder="Filtre Code-barre..."
                    class="w-full px-4 py-3 border-2 border-custom-border rounded-full text-sm transition-all duration-300 bg-white shadow-input focus:outline-none focus:border-custom-brandLight focus:ring-4 focus:ring-custom-brandLight/15"
                  />
                  <div
                    id="barcode_suggestions_consultation"
                    class="autocomplete-suggestions"
                  ></div>
                </div>
                <div class="box-input-wrapper">
                  <input
                    type="text"
                    id="type_materiel_consultation"
                    placeholder="Filtre Type..."
                    class="w-full px-4 py-3 border-2 border-custom-border rounded-full text-sm transition-all duration-300 bg-white shadow-input focus:outline-none focus:border-custom-brandLight focus:ring-4 focus:ring-custom-brandLight/15"
                  />
                  <div
                    id="type_suggestions_consultation"
                    class="autocomplete-suggestions"
                  ></div>
                </div>
                <div class="box-input-wrapper">
                  <input
                    type="text"
                    id="nom_materiel_consultation"
                    placeholder="Filtre Nom..."
                    class="w-full px-4 py-3 border-2 border-custom-border rounded-full text-sm transition-all duration-300 bg-white shadow-input focus:outline-none focus:border-custom-brandLight focus:ring-4 focus:ring-custom-brandLight/15"
                  />
                  <div
                    id="nom_suggestions_consultation"
                    class="autocomplete-suggestions"
                  ></div>
                </div>
                <button
                  type="button"
                  onclick="resetFiltersConsultation()"
                  class="px-6 py-3 border-2 border-[#ccc] bg-white text-gray-800 rounded-full font-semibold text-sm shadow-input hover:bg-gray-50 transition-all duration-300"
                >
                  Effacer
                </button>
                <input
                  type="checkbox"
                  id="toggle_caisse_consultation"
                  class="hidden"
                />
              </div>
            </div>

            <!-- Checkbox moved -->
          </div>
        </div>

        <!-- Panels for Caisse Details (Moved to Modal) -->
        <div
          id="modal_caisse"
          class="fixed inset-0 z-1000 hidden items-center justify-center p-4"
        >
          <!-- Backdrop -->
          <div
            class="absolute inset-0 bg-black/50 backdrop-blur-sm modal-backdrop"
          ></div>

          <div
            class="bg-white p-8 border border-[#888] w-[80%] max-w-[700px] shadow-[0_4px_8px_0_rgba(0,0,0,0.2),0_6px_20px_0_rgba(0,0,0,0.19)] relative z-10 rounded-xl"
          >
            <span
              class="close-modal text-[#aaa] float-right text-[28px] font-bold cursor-pointer transition-colors duration-200 hover:text-black focus:text-black absolute top-[15px] right-[20px] z-10001"
              id="close_modal_caisse"
              >&times;</span
            >
            <div id="modal_caisse_body" class="mt-5">
              <div id="panel_ajout_caisse" class="hidden w-full pt-2.5">
                <form id="form_ajout_caisse" class="w-full">
                  <h4 class="mb-2.5 text-lg font-semibold">Nouvelle Caisse</h4>
                  <div class="flex gap-2.5 mb-2.5">
                    <input
                      type="text"
                      id="nom_caisse_ajout"
                      placeholder="Nom de la caisse"
                      required
                      class="flex-1 px-4 py-3 border-2 border-custom-border rounded-lg text-sm transition-all duration-300 bg-white shadow-input focus:outline-none focus:border-custom-brandLight focus:ring-4 focus:ring-custom-brandLight/15"
                    />
                    <button
                      type="submit"
                      class="px-6 py-3 border-2 border-custom-brandLight bg-custom-brandLight text-white rounded-lg font-semibold text-sm shadow-input hover:shadow-[0_4px_15px_rgba(182,160,113,0.4)] hover:-translate-y-0.5 transition-all duration-300"
                    >
                      Créer
                    </button>
                    <button
                      type="button"
                      class="btn-reset px-6 py-3 border-2 border-custom-border bg-white text-gray-800 rounded-lg font-semibold text-sm shadow-input hover:bg-gray-50 transition-all duration-300"
                      data-form="form_ajout_caisse"
                    >
                      Réinitialiser
                    </button>
                  </div>
                  <div
                    class="box-input-wrapper w-full relative min-w-[150px] flex-1 overflow-visible"
                  >
                    <input
                      type="text"
                      id="search_objets_ajout"
                      placeholder="Scanner objets pour la caisse..."
                      class="w-full px-4 py-3 border-2 border-custom-border rounded-lg text-sm transition-all duration-300 bg-white shadow-input focus:outline-none focus:border-custom-brandLight focus:ring-4 focus:ring-custom-brandLight/15"
                    />
                    <div
                      id="objets_suggestions_ajout"
                      class="autocomplete-suggestions"
                    ></div>
                  </div>
                  <div
                    id="objets_list_ajout"
                    class="mt-2.5 p-2.5 border border-dashed border-[#ccc] min-h-[40px] rounded-lg bg-gray-50"
                  ></div>
                </form>
              </div>

              <div id="panel_suppression_caisse" class="hidden w-full pt-2.5">
                <form id="form_suppression_caisse" class="w-full">
                  <!-- Input Caisse moved here -->
                  <div
                    id="caisse_input_group_suppr"
                    class="box-input-wrapper mb-4 relative min-w-[150px] flex-1 overflow-visible"
                  >
                    <input
                      type="text"
                      id="nom_caisse_suppr"
                      placeholder="Nom caisse..."
                      class="w-full px-4 py-3 border-2 border-custom-border rounded-lg text-sm transition-all duration-300 bg-white shadow-input focus:outline-none focus:border-custom-brandLight focus:ring-4 focus:ring-custom-brandLight/15"
                    />
                    <div class="autocomplete-suggestions"></div>
                  </div>
                  <p class="text-gray-600 mb-4">
                    Sélectionnez la caisse à supprimer ci-dessus.
                  </p>
                  <div id="caisse_details_suppr" class="mb-4"></div>
                  <div class="flex gap-2.5 mt-2.5">
                    <button
                      type="submit"
                      class="px-6 py-3 border-2 border-custom-danger bg-linear-to-br from-custom-danger to-custom-dangerDark text-white rounded-lg font-semibold text-sm shadow-input hover:shadow-[0_4px_15px_rgba(239,68,68,0.4)] hover:-translate-y-0.5 transition-all duration-300"
                    >
                      Confirmer Suppression
                    </button>
                    <button
                      type="button"
                      class="btn-reset px-6 py-3 border-2 border-custom-border bg-white text-gray-800 rounded-lg font-semibold text-sm shadow-input hover:bg-gray-50 transition-all duration-300"
                      data-form="form_suppression_caisse"
                    >
                      Réinitialiser
                    </button>
                  </div>
                </form>
              </div>

              <div id="panel_modification_caisse" class="hidden w-full pt-2.5">
                <form id="form_modification_caisse" class="w-full">
                  <!-- JS fills this -->
                  <div
                    class="box-input-wrapper mb-2.5 relative min-w-[150px] flex-1 overflow-visible"
                  >
                    <input
                      type="text"
                      id="nom_caisse_modif"
                      placeholder="Rechercher caisse..."
                      class="w-full px-4 py-3 border-2 border-custom-border rounded-lg text-sm transition-all duration-300 bg-white shadow-input focus:outline-none focus:border-custom-brandLight focus:ring-4 focus:ring-custom-brandLight/15"
                    />
                    <div class="autocomplete-suggestions"></div>
                  </div>
                  <div id="caisse_details_modif" class="hidden">
                    <div class="flex gap-2.5 mb-2.5">
                      <input
                        type="text"
                        id="nouveau_nom_caisse"
                        placeholder="Nouveau nom"
                        class="flex-1 px-4 py-3 border-2 border-custom-border rounded-lg text-sm transition-all duration-300 bg-white shadow-input focus:outline-none focus:border-custom-brandLight focus:ring-4 focus:ring-custom-brandLight/15"
                      />
                      <select
                        id="etat_caisse_modif"
                        class="px-4 py-3 border-2 border-custom-border rounded-lg text-sm transition-all duration-300 bg-white shadow-input focus:outline-none focus:border-custom-brandLight focus:ring-4 focus:ring-custom-brandLight/15"
                      >
                        <option value="disponible">Disponible</option>
                        <option value="réservé">Réservé</option>
                        <option value="emprunté">Emprunté</option>
                      </select>
                    </div>
                    <!-- User selection for caisse -->
                    <div
                      class="box-input-wrapper mb-2.5 relative min-w-[150px] flex-1 overflow-visible"
                    >
                      <input
                        type="text"
                        id="utilisateur_caisse_modif"
                        placeholder="Utilisateur..."
                        class="w-full px-4 py-3 border-2 border-custom-border rounded-lg text-sm transition-all duration-300 bg-white shadow-input focus:outline-none focus:border-custom-brandLight focus:ring-4 focus:ring-custom-brandLight/15"
                      />
                      <input type="hidden" id="utilisateur_caisse_modif_id" />
                    </div>

                    <div
                      class="box-input-wrapper relative min-w-[150px] flex-1 overflow-visible"
                    >
                      <input
                        type="text"
                        id="search_objets_modif"
                        placeholder="Scanner objets..."
                        class="w-full px-4 py-3 border-2 border-custom-border rounded-lg text-sm transition-all duration-300 bg-white shadow-input focus:outline-none focus:border-custom-brandLight focus:ring-4 focus:ring-custom-brandLight/15"
                      />
                      <div
                        id="objets_suggestions_modif"
                        class="autocomplete-suggestions"
                      ></div>
                    </div>
                    <div id="caisse_contenu_modif" class="my-2.5"></div>
                    <div id="objets_table_container_modif"></div>

                    <div class="flex gap-2.5 mt-2.5">
                      <button
                        type="submit"
                        class="px-6 py-3 border-2 border-custom-brandLight bg-custom-brandLight text-white rounded-lg font-semibold text-sm shadow-input hover:shadow-[0_4px_15px_rgba(182,160,113,0.4)] hover:-translate-y-0.5 transition-all duration-300"
                      >
                        Sauvegarder Caisse
                      </button>
                      <button
                        type="button"
                        class="btn-reset px-6 py-3 border-2 border-custom-border bg-white text-gray-800 rounded-lg font-semibold text-sm shadow-input hover:bg-gray-50 transition-all duration-300"
                        data-form="form_modification_caisse"
                      >
                        Réinitialiser
                      </button>
                    </div>
                  </div>
                </form>
              </div>
            </div>
            <!-- End modal_caisse_body -->
          </div>
          <!-- End modal-content -->
        </div>
        <!-- End modal_caisse -->

        <div class="p-8 overflow-x-auto w-full mt-5">
          <div class="flex items-center gap-1.5 mb-4">
            <input
              type="checkbox"
              id="toggle_caisse_view"
              class="w-auto border-custom-border rounded accent-custom-brandLight"
            />
            <label
              for="toggle_caisse_view"
              class="cursor-pointer font-medium select-none"
              >Vue Caisses</label
            >
          </div>
          <div id="full_inventory">
            <table id="inventory_table" class="w-full border-collapse bg-white">
              <thead
                class="bg-linear-to-br from-custom-brandLight to-custom-brandDark text-white select-none"
              >
                <tr>
                  <th
                    class="p-4.5 font-semibold tracking-wide uppercase text-sm sticky top-0 z-10 border-b-2 border-custom-brandLight text-center cursor-pointer hover:bg-white/10 transition-colors"
                    onclick="window.sortInventory('Code_bar')"
                  >
                    Code-barre
                    <span
                      id="sort_icon_Code_bar"
                      class="text-xs opacity-50 ml-1"
                      >↕</span
                    >
                  </th>
                  <th
                    class="p-4.5 font-semibold tracking-wide uppercase text-sm sticky top-0 z-10 border-b-2 border-custom-brandLight text-center cursor-pointer hover:bg-white/10 transition-colors"
                    onclick="window.sortInventory('Type')"
                  >
                    Type
                    <span id="sort_icon_Type" class="text-xs opacity-50 ml-1"
                      >↕</span
                    >
                  </th>
                  <th
                    class="p-4.5 font-semibold tracking-wide uppercase text-sm sticky top-0 z-10 border-b-2 border-custom-brandLight text-center cursor-pointer hover:bg-white/10 transition-colors"
                    onclick="window.sortInventory('Nom')"
                  >
                    Nom
                    <span id="sort_icon_Nom" class="text-xs opacity-50 ml-1"
                      >↕</span
                    >
                  </th>
                  <th
                    class="p-4.5 font-semibold tracking-wide uppercase text-sm sticky top-0 z-10 border-b-2 border-custom-brandLight text-center cursor-pointer hover:bg-white/10 transition-colors"
                    onclick="window.sortInventory('Etat')"
                  >
                    État
                    <span id="sort_icon_Etat" class="text-xs opacity-50 ml-1"
                      >↕</span
                    >
                  </th>
                  <th

            class="px-6 py-3 border-2 border-custom-brandLight bg-custom-brandLight text-white rounded-full font-semibold text-sm shadow-input hover:shadow-[0_4px_15px_rgba(182,160,113,0.4)] hover:-translate-y-0.5 transition-all duration-300"

      <script>
        // Simple logic for UI switching (No external dependency needed for basic toggle)
        document.addEventListener("DOMContentLoaded", () => {
          const modeSelector = document.getElementById("modeSelector");
          const forms = {
            ajout: document.getElementById("form_ajout"),
            suppression: document.getElementById("form_suppression"),
            modification: document.getElementById("form_modification"),
            consultation: document.getElementById("filters_consultation"),
          };
          const panels = {
            ajout: document.getElementById("panel_ajout_caisse"),
            suppression: document.getElementById("panel_suppression_caisse"),
            modification: document.getElementById("panel_modification_caisse"),
          };

          const updateUI = () => {
            const mode = modeSelector.value;
            Object.values(forms).forEach((f) => f && f.classList.add("hidden"));
            Object.values(panels).forEach(
              (p) => p && p.classList.add("hidden"),
            ); // Hide panels on mode switch

            if (forms[mode]) {
              const isGridChecked =
                document.getElementById("toggle_caisse_view")?.checked;
              if (mode === "consultation" && isGridChecked) {
                // Do not show consultation filters if grid view is active
              } else {
                forms[mode].classList.remove("hidden");
              }
            }
          };

          modeSelector.addEventListener("change", updateUI);
          updateUI();

          // View Toggle
          document
            .getElementById("toggle_caisse_view")
            .addEventListener("change", (e) => {
              const isGrid = e.target.checked;
              document
                .getElementById("full_inventory")
                .classList.toggle("hidden", isGrid);
              document
                .getElementById("caisses_view")
                .classList.toggle("hidden", !isGrid);

              // Sync
              const leg = document.getElementById("toggle_caisse_consultation");
              if (leg) {
                leg.checked = isGrid;
                leg.dispatchEvent(new Event("change"));
              }
            });

          // Panel Toggles
          const bindPanel = (chkId, pnlId) => {
            const chk = document.getElementById(chkId);
            if (chk)
              chk.addEventListener("change", (e) => {
                const p = document.getElementById(pnlId);
                if (p) {
                  if (e.target.checked) p.classList.remove("hidden");
                  else p.classList.add("hidden");
                }
                // Handle suppr special case to show/hide specific inputs
                if (chkId === "toggle_caisse_suppression") {
                  const grp = document.getElementById(
                    "caisse_input_group_suppr",
                  );
                  if (grp) {
                    if (e.target.checked) grp.classList.remove("hidden");
                    else grp.classList.add("hidden");
                  }
                }
              });
          };
          bindPanel("toggle_caisse_ajout", "panel_ajout_caisse");
          bindPanel("toggle_caisse_suppression", "panel_suppression_caisse");
          bindPanel("toggle_caisse_modification", "panel_modification_caisse");
        });

        // Legacy global
        window.switchTab = (t) => {
          const s = document.getElementById("modeSelector");
          if (s) {
            s.value = t;
            s.dispatchEvent(new Event("change"));
          }
        };
      </script>

      <script src="Javascript/UniversalAutocomplete.js?v=2"></script>

      <script src="Javascript/delete_caisse.js"></script>
      <script src="Javascript/update_caisse.js?v=2"></script>
      <script src="Javascript/textFieldLoader.js?v=2"></script>
      <script src="Javascript/delete_materiel.js"></script>
      <script src="Javascript/update_materiel.js?v=2"></script>
      <script src="Javascript/filter_consultation.js"></script>
      <script src="Javascript/download_pdf.js"></script>
      <script src="Javascript/add_materiel.js?v=3"></script>
      <script src="Javascript/form_actions.js?v=2"></script>
      <script src="Javascript/caisse_form_toggle.js?v=1"></script>
    </div>
  </body>
